<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{layout :: head('Menu item details')}"></head><body><div th:replace="~{layout :: nav}"></div><div class="card"><h1 th:text="${item.name}"></h1><p><b>Description:</b> <span th:text="${item.description}"></span></p><p><b>Price:</b> <span th:text="${item.price}"></span></p><p><b>Available:</b> <span th:text="${item.available}"></span></p><p><b>Restaurant:</b> <a th:href="@{/restaurants/{id}(id=${item.restaurantId})}" th:text="${item.restaurantName}"></a></p></div></body></html>

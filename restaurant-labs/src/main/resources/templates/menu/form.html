<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{layout :: head('Menu form')}"></head><body><div th:replace="~{layout :: nav}"></div><div class="card"><h1>Menu item form</h1><form th:action="${id} == null ? @{/menu} : @{/menu/{id}(id=${id})}" th:object="${item}" method="post"><label>Name</label><input th:field="*{name}"><div class="error" th:errors="*{name}"></div><label>Description</label><textarea th:field="*{description}"></textarea><div class="error" th:errors="*{description}"></div><label>Price</label><input type="number" step="0.01" th:field="*{price}"><div class="error" th:errors="*{price}"></div><label>Restaurant</label><select th:field="*{restaurantId}"><option value="">Choose restaurant</option><option th:each="r:${restaurants}" th:value="${r.id}" th:text="${r.name}"></option></select><div class="error" th:errors="*{restaurantId}"></div><label><input type="checkbox" th:field="*{available}" style="width:auto"> Available</label><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button>Save</button></form></div></body></html>

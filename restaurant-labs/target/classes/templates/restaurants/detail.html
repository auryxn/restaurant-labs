<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{layout :: head('Restaurant details')}"></head><body><div th:replace="~{layout :: nav}"></div><div class="card"><h1 th:text="${restaurant.name}"></h1><p><b>Address:</b> <span th:text="${restaurant.address}"></span></p><p><b>Cuisine:</b> <span th:text="${restaurant.cuisine}"></span></p><p><b>Menu items:</b> <span th:text="${restaurant.menuItemsCount}"></span></p><a th:href="@{/menu(restaurantId=${restaurant.id})}">Show menu</a></div></body></html>
